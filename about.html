<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadyomeno</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png"/>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            overflow: hidden; 
        }

        .container {
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            position: absolute; 
            top: 23%; 
            left: 2%; 
            transform: translateY(-50%);
        }

        .dropdown-icon {
            width: 80%; 
            height: auto;
        }

        @media (max-width: 767px) and (orientation: portrait) and (-webkit-min-device-pixel-ratio: 2) {
        .container {
            position: absolute;
            top: 2%; 
            left: 50%;
            transform: translate(-50%, 0); 
        }

        .dropdown-icon {
            max-width: none; 
            width: 50vw;
            height: auto;
        }

        .slider-container {
            max-width: none; 
            width: 90vw; 
            height: 50vh; 
            position: relative; 
            margin-top: 10vh; /* Moves slider container further down */
        }

        .slider-container .image {
            width: 100%; 
            height: auto;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/anaduomeno.png" alt="Anadyomeno Cigarettes" class="dropdown-icon">
        <div class="dropdown-content">
            <a href="index.html"  data-text="Home"><img src="images/home.png" alt="Home" class="dropdown-item"></a>
            <a href="clothes.html"><img src="images/clothes.png" alt="About" class="dropdown-item"></a>
            <a href="clothes.html"><img src="images/contact.png" alt="Contact" class="dropdown-item"></a>
        </div>
    </div>

    <div class="slider-container">
        <div class="image-stack">
            <img src="images/wtf.jpg" alt="Image 1" class="image">
            <img src="images/wtf2.png" alt="Image 2" class="image">
            <img src="images/wtf4.png" alt="Image 3" class="image">
            <img src="images/wtf3.png" alt="Image 4" class="image">
        </div>
    </div>
    
    <script>
       document.addEventListener('DOMContentLoaded', () => {
    const sliderContainer = document.querySelector('.slider-container');
    const imageStack = document.querySelectorAll('.image');

    let isDragging = false;
    let startX = 0;
    let currentIndex = 0;

    imageStack.forEach((img) => {
        img.addEventListener('dragstart', (e) => e.preventDefault());
    });

    // Add event listeners for both mouse and touch
    sliderContainer.addEventListener('mousedown', startDrag);
    sliderContainer.addEventListener('touchstart', startDrag, { passive: true });

    sliderContainer.addEventListener('mousemove', drag);
    sliderContainer.addEventListener('touchmove', drag, { passive: true });

    sliderContainer.addEventListener('mouseup', endDrag);
    sliderContainer.addEventListener('mouseleave', endDrag);
    sliderContainer.addEventListener('touchend', endDrag);

    function startDrag(e) {
        isDragging = true;
        startX = getPositionX(e);
        sliderContainer.style.cursor = 'grabbing';
    }

    function drag(e) {
        if (!isDragging) return;

        const currentPosition = getPositionX(e);
        const movedBy = currentPosition - startX;

        // Update image positions during dragging
        imageStack.forEach((img, index) => {
            const offset = index - currentIndex + movedBy / 300; // Adjust sensitivity
            img.style.transform = `
                translateX(${offset * 15}%) 
                translateZ(${offset * -50}px) 
                rotateY(${offset * 5}deg)
            `;
            img.style.opacity = `${1 - Math.abs(offset) * 0.2}`;
            img.style.zIndex = `${4 - Math.abs(Math.round(offset))}`;
            img.style.transition = 'none'; // No transition during drag
        });
    }

    function endDrag(e) {
        if (!isDragging) return;
        isDragging = false;
        sliderContainer.style.cursor = 'grab';

        const endPosition = getPositionX(e);
        const movedBy = endPosition - startX;

        // Snap to the nearest image
        if (movedBy < -50 && currentIndex < imageStack.length - 1) {
            currentIndex++;
        } else if (movedBy > 50 && currentIndex > 0) {
            currentIndex--;
        }

        updateImages();
    }

    function updateImages() {
        imageStack.forEach((img, index) => {
            const offset = index - currentIndex;
            img.style.transform = `
                translateX(${offset * 15}%) 
                translateZ(${offset * -50}px) 
                rotateY(${offset * 5}deg)
            `;
            img.style.opacity = `${1 - Math.abs(offset) * 0.5}`;
            img.style.filter = offset === 0 ? 'none' : `grayscale(${50 + Math.abs(offset) * 25}%)`;
            img.style.zIndex = `${4 - Math.abs(offset)}`;
            img.style.transition = 'transform 0.3s ease'; // Smooth snapping after drag
        });
    }

    function getPositionX(e) {
        return e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
    }

    updateImages();
});


    </script>

<script src="index.js"></script>

</body>
</html>
