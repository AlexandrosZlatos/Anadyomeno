<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadyomeno</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png"/>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            overflow: hidden; 
        }

        .container {
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            position: absolute; 
            top: 23%; 
            left: 2%; 
            transform: translateY(-50%);
        }

        .dropdown-icon {
            width: 80%; 
            height: auto;
        }

        @media (max-width: 767px) and (orientation: portrait) and (-webkit-min-device-pixel-ratio: 2) {
        .container {
            position: absolute;
            top: 2%; 
            left: 50%;
            transform: translate(-50%, 0);
            z-index: 12; /* Ensure it's above other elements */ 
        }

        .dropdown-icon {
            max-width: 280px; 
            width: 100%;
            height: auto;
        }

        .slider-container {
            max-width: 400px; 
            width: 90vw; 
            height: 50vh; 
            position: relative; 
            margin-top: 10vh; /* Moves slider container further down */
        }

        .slider-container .image {
            width: 100%; 
            height: auto;
        }

        a[data-text]::after {
            content: attr(data-text);
            display: block;
            text-align: center;
            margin-top: 10px;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;   
        }

        .dropdown-content img {
            display: none;
        }

        .dropdown-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 100%; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: auto;
            gap: 20px; 
            z-index: 10;
            background-color: black;
            padding: 10px;
        }
        .dropdown-content a {
            text-decoration: none;
        }

        body.dropdown-active .overlay {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); 
            z-index: 10;
            display: none; 
        }
        }

        @media (min-width: 767px) and (max-width: 991px) and (orientation: portrait) {
        .container {
            position: absolute;
            top: 0%; 
            left: 50%;
            transform: translate(-50%, 0); 
        }

        .dropdown-icon {
            max-width: 280px; 
            width: 100%;
            height: auto;
        }

        .slider-container {
            max-width: 490px; 
            width: 90vw; 
            height: 50vh; 
            position: relative; 
            margin-top: 10vh; 
        }

        .slider-container .image {
            width: 100%; 
            height: auto;
        }
        }

        @media (min-width: 991px) and (max-width: 1200px) and (orientation: portrait) {
            .container {
                position: absolute;
                top: 0%; 
                left: 50%;
                transform: translate(-50%, 0); 
            }

            .dropdown-icon {
                max-width: 280px; 
                width: 100%;
                height: auto;
            }

            .slider-container {
                max-width: 650px; 
                width: 120vw; 
                height: 50vh; 
                position: relative; 
                margin-top: 10vh; 
            }

            .slider-container .image {
                width: 100%; 
                height: auto;
            }

            #image-tracker {
                font-size: 2rem; 
                bottom: 4vh; 
                position: relative;
                text-align: center;
            }
        }

        @media (max-width: 767px) and (orientation: landscape) { 
            .container {
                position: absolute;
                top: 0%; 
                left: 50%;
                transform: translate(-50%, 0);
                text-align: center;
                width: auto; 
            }

            .dropdown-icon {
                max-width: 400px;
                width: 20%; 
                height: auto;
            }

            .slider-container {
                max-width: 250px;
                width: 30%; 
                position: relative;
                margin: 8% auto 0;
            }

            .slider-container .image {
                width: 100%; 
                height: auto;
            }

            #image-tracker {
                font-size: 0.9rem; 
                bottom: 12vh; 
                position: relative;
                margin-top: 10px; 
                text-align: center;
            }
        }

        @media (min-width: 767px) and (max-width: 991px) and (orientation: landscape) {
            .container {
                position: absolute;
                top: 0%; 
                left: 50%;
                transform: translate(-50%, 0);
                text-align: center; 
                width: auto; 
            }

            .dropdown-icon {
                max-width: 400px;
                width: 22%; 
                height: auto;
            }

            .slider-container {
                max-width: 250px;
                width: 27%;
                position: relative;
                margin: 8% auto 0;
            }

            .slider-container .image {
                width: 100%;
                height: auto;
            }

            #image-tracker {
                font-size: 0.9rem; 
                bottom: 45px; 
                position: relative;
                margin-top: 10px; 
                text-align: center;
            }
           
        }

        @media (min-width: 991px) and (max-width: 1200px) and (orientation: landscape) {
            .container {
                position: absolute;
                top: 0%; 
                left: 50%;
                transform: translate(-50%, 0);
                text-align: center; 
                width: auto; 
            }

            .dropdown-icon {
                max-width: 400px;
                width: 60%; 
                height: auto;
            }

            .slider-container {
                max-width: 550px;
                width: 35%;
                position: relative;
                margin: 8% auto 0;
            }

            .slider-container .image {
                width: 100%;
                height: auto;
            }

            #image-tracker {
                font-size: 1.3rem; 
                bottom: 15vh; 
                position: relative;
                text-align: center;
            }
           
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/anaduomeno.png" alt="Anadyomeno Cigarettes" class="dropdown-icon">
        <div class="dropdown-content">
            <a href="index.html"  data-text="Home"><img src="images/home.png" alt="Home" class="dropdown-item"></a>
            <a href="clothes.html" data-text="Clothes"><img src="images/clothes.png" alt="About" class="dropdown-item"></a>
            <a href="clothes.html" data-text="Contact"><img src="images/contact.png" alt="Contact" class="dropdown-item"></a>
        </div>
    </div>

    <div class="slider-container">
        <div class="image-stack">
            <img src="images/wtf.jpg" alt="Image 1" class="image">
            <img src="images/wtf2.png" alt="Image 2" class="image">
            <img src="images/wtf4.png" alt="Image 3" class="image">
            <img src="images/wtf3.png" alt="Image 4" class="image">
        </div>
        <div id="image-tracker">1/4</div>
    </div>
    
    <script>
       const sliderContainer = document.querySelector('.slider-container');
const imageStack = document.querySelectorAll('.image');
const imageCounter = document.getElementById('image-tracker'); // Counter element

let isDragging = false;
let startX = 0;
let movedDistance = 0;
let currentIndex = 0;

// Prevent native drag behavior
imageStack.forEach((img) => {
    img.addEventListener('dragstart', (e) => e.preventDefault());
});

// Add event listeners for dragging
sliderContainer.addEventListener('mousedown', startDrag);
sliderContainer.addEventListener('touchstart', startDrag, { passive: false });

sliderContainer.addEventListener('mousemove', drag);
sliderContainer.addEventListener('touchmove', drag, { passive: false });

sliderContainer.addEventListener('mouseup', endDrag);
sliderContainer.addEventListener('mouseleave', endDrag);
sliderContainer.addEventListener('touchend', endDrag);

// Function to update the counter
function updateCounter() {
    imageCounter.textContent = `${currentIndex + 1}/${imageStack.length}`;
}

// Function to start dragging
function startDrag(e) {
    isDragging = true;
    startX = getPositionX(e);
    movedDistance = 0; // Reset drag distance
    sliderContainer.style.cursor = e.type === 'mousedown' ? 'grabbing' : 'default';
}

// Function to handle dragging
function drag(e) {
    if (!isDragging) return;

    const currentPosition = getPositionX(e);
    const movedBy = currentPosition - startX;
    movedDistance = Math.abs(movedBy);

    // Update image positions during drag
    imageStack.forEach((img, index) => {
        const offset = index - currentIndex + movedBy / 300; // Adjust sensitivity
        img.style.transform = `
            translateX(${offset * 15}%) 
            translateZ(${offset * -50}px) 
            rotateY(${offset * 5}deg)
        `;
        img.style.opacity = `${1 - Math.abs(offset) * 0.2}`;
        img.style.zIndex = `${4 - Math.abs(Math.round(offset))}`;
        img.style.transition = 'none'; // No transition during drag
    });

    e.preventDefault(); // Prevent unintended browser behavior during touch
}

// Function to end dragging
function endDrag(e) {
    if (!isDragging) return;
    isDragging = false;
    sliderContainer.style.cursor = 'grab';

    const endPosition = getPositionX(e);
    const movedBy = endPosition - startX;

    // Snap to nearest image
    if (movedBy < -50 && currentIndex < imageStack.length - 1) {
        currentIndex++;
    } else if (movedBy > 50 && currentIndex > 0) {
        currentIndex--;
    }

    updateImages(); // Update images and counter
    movedDistance = 0; // Reset for next interaction
}

// Function to update image positions
function updateImages() {
    imageStack.forEach((img, index) => {
        const offset = index - currentIndex;
        img.style.transform = `
            translateX(${offset * 15}%) 
            translateZ(${offset * -50}px) 
            rotateY(${offset * 5}deg)
        `;
        img.style.opacity = `${1 - Math.abs(offset) * 0.5}`;
        img.style.zIndex = `${4 - Math.abs(offset)}`;
        img.style.transition = 'transform 0.3s ease'; // Smooth snapping
    });
    updateCounter(); // Update the counter
}

// Function to get the X position of the pointer
function getPositionX(e) {
    if (e.type.includes('mouse')) {
        return e.clientX; // For mouse events
    } else if (e.touches && e.touches[0]) {
        return e.touches[0].clientX; // For touch events
    } else if (e.changedTouches && e.changedTouches[0]) {
        return e.changedTouches[0].clientX; // For touchend events
    }
    return 0; // Default fallback
}

// Initialize slider and counter
updateImages();

    </script>

<div class="overlay"></div>
<script src="index.js"></script>

</body>
</html>
