<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadyomeno</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png"/>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }   

        /* Dropdown Icon and Content */
        .container {
            position: absolute;
            top: 10%; /* Adjust icon position */
            left: 5%; /* Adjust icon position */
        }

        .dropdown-icon {
            width: 80%; /* Adjust icon size relative to the container width */
            cursor: pointer;
        }

        /* Contact Form Styling */
        .contact-container {
            padding: 1.25rem; /* Converted from 20px */
            width: 100%;
            max-width: 31.25rem; /* Converted from 500px */
            text-align: center;
        }

        .contact-container h2 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 0.625rem; /* Converted from 10px */
        }

        .contact-container p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 1.25rem; /* Converted from 20px */
        }

        .contact-container form {
            display: flex;
            flex-direction: column;
        }

        .contact-container label {
            font-size: 0.9rem;
            color: #333;
            margin-bottom: 0.3125rem; /* Converted from 5px */
            text-align: left;
            display: block;
        }

        .contact-container input,
        .contact-container textarea {
            width: 100%;
            padding: 0.625rem; /* Converted from 10px */
            margin-bottom: 0.9375rem; /* Converted from 15px */
            border: 0.0625rem solid #ddd; /* Converted from 1px */
            border-radius: 0.3125rem; /* Converted from 5px */
            font-size: 1rem;
        }

        .contact-container textarea {
            resize: none;
        }

        .contact-container input[type="submit"] {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 0.625rem 1.25rem; /* Converted from 10px 20px */
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            border-radius: 0.3125rem; /* Converted from 5px */
        }

        .contact-container input[type="submit"]:hover {
            background-color: #555;
        }


    </style>
</head>
<body>
    <div class="container">
        <img src="images/anaduomeno.png" alt="Anadyomeno Cigarettes" class="dropdown-icon">
        <div class="dropdown-content">
            <a href="index.html"><img src="images/home.png" alt="Home" class="dropdown-item"></a>
            <a href="clothes.html"><img src="images/clothes.png" alt="Clothes" class="dropdown-item"></a>
            <a href="about.html"><img src="images/about.png" alt="About" class="dropdown-item"></a>
        </div>
    </div>

    <div class="contact-container">
        <h2>Contact Us</h2>
        <p>For returns or any other problem with your order, please email test@test.com</p>
        <form id="contactForm" method="POST" action="/send">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Name" required>
            
            <label for="email">Email*</label>
            <input type="email" id="email" name="email" placeholder="Email" required>
            
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="Phone">
            
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Message" required></textarea>
            
            <input type="submit" value="Send">
        </form>
    </div>
</body>
</html>
