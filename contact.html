    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadyomeno</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png"/>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }   

        .container {
            position: absolute;
            top: 10%; 
            left: 5%; 
        }

        .dropdown-icon {
            width: 80%; 
            cursor: pointer;
        }

        .contact-container {
            padding: 1.25rem; 
            width: 100%;
            max-width: 31.25rem; 
            text-align: center;
        }

        .contact-container h2 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 0.625rem; 
        }

        .contact-container p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 1.25rem;
        }

        .contact-container form {
            display: flex;
            flex-direction: column;
        }

        .contact-container label {
            font-size: 0.9rem;
            color: #333;
            margin-bottom: 0.3125rem;
            text-align: left;
            display: block;
        }

        .contact-container input,
        .contact-container textarea {
            width: 100%;
            padding: 0.625rem; 
            margin-bottom: 0.9375rem; 
            border: 0.0625rem solid #ddd;
            border-radius: 0.3125rem; 
            font-size: 1rem;
        }

        .contact-container textarea {
            resize: none;
        }

        .contact-container input[type="submit"] {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 0.625rem 1.25rem; 
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            border-radius: 0.3125rem; 
        }

        .contact-container input[type="submit"]:hover {
            background-color: #555;
        }


        @media (max-width: 767px) and (orientation: portrait) and (-webkit-min-device-pixel-ratio: 2) {
            .container {
                top: 2%; 
                left: 50%;
                transform: translateX(-50%);
                z-index: 2;
            }

            .dropdown-icon {
                max-width: 65%; 
                width: 100%; 
            }

            .contact-container {
                padding: 1rem; 
                margin-top: 5rem;
                max-width: 95%; 
            }

            .contact-container h2 {
                font-size: 2.3rem; 
            }

            .contact-container label {
                font-size: 1.3rem; 
                margin-bottom: 0.4rem; 
            }

            .contact-container p {
                font-size: 1.2rem; 
            }

            .contact-container input,
            .contact-container textarea {
                font-size: 1rem;
                padding: 0.5rem; 
            }

            .contact-container input[type="submit"] {
                font-size: 1.2rem; 
                padding: 0.6rem 1rem;
            }

            a[data-text]::after {
                content: attr(data-text);
                display: block;
                text-align: center;
                margin-top: 10px;
                color: white;
                font-size: 1.5rem;
                text-transform: uppercase;   
            }

            .dropdown-content img {
                display: none;
            }

            .dropdown-content {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 100%; 
                left: 50%;
                transform: translateX(-50%);
                width: 100%;
                height: auto;
                gap: 20px; 
                z-index: 1;
                background-color: black;
                padding: 10px;
            }
            .dropdown-content a {
                text-decoration: none;
            }

            body.dropdown-active .overlay {
                display: block;
            }

            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.8); 
                z-index: 1;
                display: none; 
            }

        }

<body>
    <div class="container">
        <img src="images/anaduomeno.png" alt="Anadyomeno Cigarettes" class="dropdown-icon">
        <div class="dropdown-content">
            <a href="index.html" data-text="Home"><img src="images/home.png" alt="Home" class="dropdown-item"></a>
            <a href="clothes.html" data-text="Clothes"><img src="images/clothes.png" alt="Clothes" class="dropdown-item"></a>
            <a href="about.html" data-text="About"><img src="images/about.png" alt="About" class="dropdown-item"></a>
        </div>
    </div>

    <div class="contact-container">
        <h2>Contact Us</h2>
        <p>For returns or any other problem with your order, please email test@test.com</p>
        <form id="contactForm" method="POST" action="/send">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Name" required>
            
            <label for="email">Email*</label>
            <input type="email" id="email" name="email" placeholder="Email" required>
            
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="Phone">
            
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Message" required></textarea>
            
            <input type="submit" value="Send">
        </form>
    </div>

    </script>
    <div class="overlay"></div>
