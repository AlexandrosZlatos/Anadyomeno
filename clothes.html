<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadyomeno</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png"/>
    <link rel="stylesheet" href="styles.css">
    <style>

    .dropdown-content {
        position: absolute;
        top: 45%; 
        left: 20%;
        
    }

    .dropdown-item {
        opacity: 0.8;
        transition: transform 0.3s, opacity 0.3s;
       
    }

    .dropdown-item:hover {
        transform: scale(1.1); 
        opacity: 1; 
    }

    @media (max-width: 767px) and (orientation: portrait) {
    /* Main content styling to center items vertically */
    .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        /* width: 100%; */
    }

    /* Center the dropdown icon */
    .dropdown-icon {
        width: 80%;
        max-width: 250px;
        margin-bottom: 20px;
        display: block;
    }

    /* Expand the clothes container height and make it scrollable */
    .clothes-container {
        display: grid;
        grid-template-columns: 1fr 1fr; 
        gap: 20px; 
        max-width: 500px; 
        margin: 0 auto;
        padding: 10px;
        overflow-y: auto; 
        width: 100%;
    }

    /* Ensure each .clothes-item is isolated */
    .clothes-item {
        position: relative;
        z-index: 1; 
    }

    /* Larger image sizes */
    .clothes-item img {
        width: 100%;
        max-width: 240px; 
        height: auto;
        position: relative; 
        z-index: 1; 
    }


}


    </style>
</head>
<body class="clothes-page">
    <div class="main-content">
        <!-- Dropdown Icon Section -->
        <div class="container">
            <img src="images/anaduomeno.png" alt="Anadyomeno Cigarettes" class="dropdown-icon">
            <div class="dropdown-content">
                <a href="clothes.html"><img src="images/clothes.png" alt="Clothes" class="dropdown-item"></a>
                <a href="clothes.html"><img src="images/about.png" alt="About" class="dropdown-item"></a>
                <a href="clothes.html"><img src="images/contact.png" alt="Contact" class="dropdown-item"></a>
            </div>
        </div>

        <!-- Clothes Grid Section -->
        <div class="clothes-container">
            <div class="clothes-item">
                <a href="#"><img src="images/IMG_0456.jpg" alt="Product Image"></a>
            </div>
            <div class="clothes-item">
                <a href="#"><img src="images/IMG_0639.jpg" alt="Product Image"></a>
            </div>
            <div class="clothes-item">
                <a href="#"><img src="images/image0.jpg" alt="Product Image"></a>
            </div>
            <div class="clothes-item">
                <a href="#"><img src="images/IMG_4859.jpg" alt="Product Image"></a>
            </div>
            <div class="clothes-item">
                <a href="#"><img src="images/IMG_4867 (1).jpg" alt="Product Image"></a>
            </div>
        </div>
    </div>
</body>
</html>
