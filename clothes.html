<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadyomeno</title>
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png"/>
    <link rel="stylesheet" href="styles.css">
    <style>

    .dropdown-content {
        position: absolute;
        top: 45%; 
        left: 20%;
        
    }

    .dropdown-item {
        opacity: 0.8;
        transition: transform 0.3s, opacity 0.3s;
       
    }

    .dropdown-item:hover {
        transform: scale(1.1); 
        opacity: 1; 
    }

    @media (max-width: 767px) and (orientation: portrait) {
    .main-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        margin: 0;
    }

    .dropdown-icon {
        width: 80%;
        max-width: 250px;
        margin-bottom: 20px;
        display: block;
        z-index: 11; 

    }

    .clothes-container {
        display: grid;
        grid-template-columns: 1fr 1fr; 
        gap: 5px; 
        max-width: 500px; 
        margin: 0 auto;
        padding: 10px;
        overflow-y: auto; 
        width: 100%;
    }
    .clothes-item {
        position: relative;
        z-index: 1; 
    }

    .clothes-item img {
        width: 100%;
        max-width: 240px; 
        height: auto;
        position: relative; 
        z-index: 1; 
    }

    .clothes-item img:hover {
        transform: none; 
    }

    a[data-text]::after {
        content: attr(data-text);
        display: block;
        text-align: center;
        margin-top: 10px;
        color: white;
        font-size: 1.5rem;
        text-transform: uppercase;
    }

    .dropdown-content img {
        display: none;
    }


    .dropdown-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: absolute;
        top: 100%; 
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        height: auto;
        gap: 20px; 
        z-index: 10;
        background-color: black;
        padding: 10px;
    }
    
    body.dropdown-active .overlay {
        display: block;
    }

    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8); 
        z-index: 9; 
        display: none; 
    }
}


    </style>
</head>
<body class="clothes-page">
    <div class="main-content">
        <!-- Dropdown Icon Section -->
        <div class="container">
            <img src="images/anaduomeno.png" alt="Anadyomeno Cigarettes" class="dropdown-icon">
            <div class="dropdown-content">
                <a href="index.html"  data-text="Home"><img src="images/home.png" alt="Home" class="dropdown-item"></a>
                <a href="clothes.html"  data-text="about"><img src="images/about.png" alt="About" class="dropdown-item"></a>
                <a href="clothes.html"  data-text="Contact"><img src="images/contact.png" alt="Contact" class="dropdown-item"></a>
            </div>
        </div>

        <!-- Clothes Grid Section -->
        <div class="clothes-container">
            <div class="clothes-item">
                <a href="#"><img src="images/IMG_0456.jpg" alt="Product Image"></a>
            </div>
            <div class="clothes-item">
                <a href="#"><img src="images/IMG_0639.jpg" alt="Product Image"></a>
            </div>
            <div class="clothes-item">
                <a href="#"><img src="images/image0.jpg" alt="Product Image"></a>
            </div>
            <div class="clothes-item">
                <a href="#"><img src="images/IMG_4859.jpg" alt="Product Image"></a>
            </div>
            <div class="clothes-item">
                <a href="#"><img src="images/IMG_4867 (1).jpg" alt="Product Image"></a>
            </div>
        </div>
    </div>

    <div class="overlay"></div>
    <script src="index.js"></script>
</body>
</html>
