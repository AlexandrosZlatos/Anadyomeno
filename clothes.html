<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadyomeno</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png"/>
    <style>
        body, html {
            height: 100%;
            background-color: rgb(233, 231, 217);
            margin: 0;
            padding: 0;
        }

        .dropdown {
            position: absolute;
            top: 170px;
            left: -10px;
            width: 20%;
        }

        .dropdown-menu {
            opacity: 0; 
            visibility: hidden; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            margin-left: -50px;
            gap: 10px;
            transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out;
        }

        
        @media (min-width: 600px) {
            .dropdown:hover .dropdown-menu,
            .dropdown-menu:hover {
                opacity: 1; 
                visibility: visible; 
            }

            
        }

        .dropdown-menu a {
            display: block;
            width: 40%; 
            max-width: 650px; 
        }

        .dropdown img {
            width: 100px; 
            height: auto; 
        }

        @media (max-width: 600px) and (orientation: portrait) {

            body, html {
                height: auto; 
                overflow-y: scroll; 
                background-color: rgb(233, 231, 217);
                margin: 0;
                padding: 0;
            }

            .dropdown {
                left: 10px;
                margin-top: -15px;
            }

            .dropdown img {
                width: 90px !important; 
                height: auto;
            }

            #images-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr); 
                margin-top: 100px;
                width: 85%;
                height: auto;
                overflow: visible; /* Remove scrolling, allow natural flow of content */
            }


            .dropdown-menu img {
                display: none;
            }


            .dropdown-menu a::after {
                content: attr(data-text);
                display: inline-block;
                color: white;
                font-size: 36px;
                padding: 20px;
                z-index: 1;
            }

            .dropdown-menu.show {
                opacity: 1;
                visibility: visible;
            }

            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: rgba(0, 0, 0, 0.7);
                opacity: 0;
                visibility: hidden;
                z-index: 9;
            }

            .dropdown-menu {
                display: flex;
                position: fixed;
                top: 50%;
                left: 50%;
                z-index: 11;
                transition: none; 
                transform: translate(-50%, -50%);
      
            }
            
        }

        @media (max-width: 1024px) and (orientation: landscape) {
            #images-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr); 
                width: 70%; 
                margin-top: 200px;
                height: auto; /* Remove any fixed height */
                overflow-y: auto; /* Allow scrolling if content exceeds view */

            }
            .product img {
                width: 100%; 
                max-width: 300px; 
                height: auto; 
            }

            .product {
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }
    </style>
</head>
<body id="clothes-page">
    <div class="dropdown">
        <a href="index.html"  tabindex="0">
            <img src="images/anaduomeno.png" alt="Clickable Image" class="dropdown-toggle" id="dropdownMenuButton">
        </a>
        <div class="overlay" id="dropdownOverlay"></div>
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="index.html" data-text="Home"><img src="images/home.png" id="image1" class="dropdown-icon"></a>
            <a href="about.html" data-text="About"><img src="images/about.png" id="image2" class="dropdown-icon"></a>
            <a href="contact.html" data-text="Contact" ><img src="images/contact.png" id="image3" class="dropdown-icon"></a>
        </div>
    </div>

    <div class="clothes-box">
        <div id="images-container" class="images-toggle">
            <div class="product">
                <a href="exoskeleton.html">
                    <img src="images/IMG_0456.jpg" alt="Product Image" class="product-image">
                </a>
            </div>
            <div class="product">
                <a href="exoskeleton-black.html">
                    <img src="images/IMG_0639.jpg" alt="Product Image" class="product-image">
                </a>
            </div>
            
            <div class="product">
                <a href="midland.html">
                    <img src="images/image0.jpg" alt="Product Image" class="product-image">
                </a>
            </div>
            
            <div class="product">
                <a href="nf-windproof.html">
                    <img src="images/IMG_4859.jpg" alt="Product Image" class="product-image">
                </a>
            </div>

            <div class="product">
                <a href="nf-fleece.html">
                    <img src="images/IMG_4867 (1).jpg" alt="Product Image" class="product-image">
                </a>
            </div>
        </div>
    </div>

    <script>
        function handleDropdownToggle(event) {
            event.preventDefault(); 
            event.stopPropagation(); 
            const dropdownMenu = document.getElementById('dropdownMenu');
            dropdownMenu.classList.toggle('show');
        }

        function handleDocumentClick(event) {
            const dropdownMenu = document.getElementById('dropdownMenu');
            if (!dropdownMenu.contains(event.target) && dropdownMenu.classList.contains('show')) {
                dropdownMenu.classList.remove('show');
            }
        }

        function setupDropdownToggle() {
            if (window.innerWidth < 600) {
                document.getElementById('dropdownMenuButton').addEventListener('click', handleDropdownToggle);
                document.addEventListener('click', handleDocumentClick);
            } else {
                document.getElementById('dropdownMenuButton').removeEventListener('click', handleDropdownToggle);
                document.removeEventListener('click', handleDocumentClick);
            }
        }

        window.addEventListener('resize', setupDropdownToggle);
        window.addEventListener('load', setupDropdownToggle);

        if (window.innerWidth <= 600) { // Check if the screen width is 600px or less
        window.addEventListener('scroll', () => {
            if (window.scrollY > 100) {
                cartSection.classList.add('visible');
            } else {
                cartSection.classList.remove('visible');
            }
        });
    }

    </script>
    <script src="index.js"></script>
</body>
</html>
