<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadyomeno</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" type="image/x-icon" href="images/logo.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <style>
        body, html {
            height: 100%;
            background-color: rgb(233, 231, 217);
            margin: 0;
            padding: 0;
        }

        .dropdown {
            position: absolute;
            top: 170px;
            left: -10px;
            width: 20%;
        }

        .dropdown-menu {
            opacity: 0; 
            visibility: hidden; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            margin-left: -50px;
            gap: 10px;
            transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out;
        }
        @media (min-width: 600px) {
            .dropdown:hover .dropdown-menu,
            .dropdown-menu:hover {
                opacity: 1; 
                visibility: visible; 
            }
        }
        .dropdown-menu a {
            display: block;
            width: 40%; 
            max-width: 650px; 
        }
        .dropdown img {
            width: 100px; 
            height: auto; 
        }

        .cart-count {
            visibility: hidden; /* Hide initially */
        }
    </style>
</head>

<div class="cart-section">
    <a href="cart.html" class="cart-link">
        <img src="images/favicon-32x32.png" alt="Cart" class="cart-icon">
        <span class="cart-count">0</span>
    </a>
</div>

<body id="clothes-page">
    <div class="dropdown">
        <a href="#"><img src="images/anaduomeno.png" alt="Clickable Image" class="dropdown-toggle" id="dropdownMenuButton"></a>
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="index.html" target="_blank"><img src="images/home.png" id="image1" class="dropdown-icon"></a>
            <a href="clothes.html" target="_blank"><img src="images/clothes.png" id="image2" class="dropdown-icon"></a>
            <a href="contact.html" target="_blank"><img src="images/contact.png" id="image3" class="dropdown-icon"></a>
        </div>
    </div>

    <div class="container">
        <div class="product-image-container">
            <img src="images/IMG_0456.jpg" alt="Main Product" class="product-image" id="mainProductImage">
            <div class="thumbnail-gallery">
                <div class="thumbnail">
                    <img src="images/IMG_0456.jpg" alt="Thumbnail 1" onclick="changeImage('images/IMG_0456.jpg')">
                </div>
                <div class="thumbnail">
                    <img src="images/IMG_0517.jpg" alt="Thumbnail 2" onclick="changeImage('images/IMG_0517.jpg')">
                </div>
                <div class="thumbnail">
                    <img src="images/IMG_0548.jpg" alt="Thumbnail 3" onclick="changeImage('images/IMG_0548.jpg')">
                </div>
                <div class="thumbnail">
                    <img src="images/IMG_0564.jpg" alt="Thumbnail 4" onclick="changeImage('images/IMG_0564.jpg')">
                </div>
            </div>
        </div>
        <div class="product-details" data-name="EXOSKELETON" data-price="€100" data-size="Large" data-image="images/IMG_0456.jpg">
            <div class="product-title">
                EXOSKELETON
            </div>
            <div class="product-price">
                €100
            </div>
            <div class="product-description">
                Customized Dickies Jacket<br>
                Size: (Man’s): Large 
                <button class="add-to-cart">ADD TO CART</button>
                <p>
                    - Work gloves will be included in the package
                </p>
                <p>
                    - Vintage Dickies Jacket
                </p>
                <p>
                    - Hand painted
                </p>
                <p>
                    - Robust Zipper
                </p>
                <p>
                    - Large pockets
                </p>
                <p>
                    - Sherpa lining
                </p>
                <p>
                    - Regular fit
                </p>
            </div>
        </div>

        <!-- Others Section -->
        <div class="others-section">
            <h3>Others</h3>
            <div class="others-items">
                <div class="other-item">
                    <a href="item1.html">
                        <img src="images/IMG_0456.jpg" alt="Item 1">
                    </a>
                </div>
                <div class="other-item">
                    <a href="item2.html">
                        <img src="images/IMG_0456.jpg" alt="Item 2">
                    </a>
                </div>
                <div class="other-item">
                    <a href="item3.html">
                        <img src="images/IMG_0456.jpg" alt="Item 3">
                    </a>
                </div>
                <div class="other-item">
                    <a href="item4.html">
                        <img src="images/IMG_0456.jpg" alt="Item 4">
                    </a>
                </div>
                <!-- Add more items as needed -->
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
