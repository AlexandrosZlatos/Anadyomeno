<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anadyomeno</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr 2.5fr 1fr 1fr;
            gap: 10px;
            align-items: start;
        }

        @media (max-width: 767px) and (orientation: portrait) and (min-resolution: 192dpi) {
            
            body {
                display: flex;
                justify-content: center;
                min-height: 100vh; 
                margin: 0;
                overflow-y: auto;
            }
            
            .main-image{
                width: 95%;
            }
            .container {
                width: 100vw; /* Full width of the screen */
            }

            .dropdown-icon {
                width: 40vw;
                height: auto;
                max-width: 100%;
                z-index: 11; 
            }

            .main-content {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                max-width: 100vw; 
                margin: 0;

            }

            .main-image-container,
            .others-container,
            .cart-label {
                width: 100%;
                max-width: 100vw; 
                margin: 1vh 0;
            }

            .details-container{
                width: 83%;
                max-width: 100vw;
                margin: 1vh 0;
            }

            .details-container h2{
                font-size: 3rem;
            }
            
            .details-container p{
                font-size: 1.5rem;
            }

            .main-image-container .thumbnail-container {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 1.2vw;
            }

            .thumbnail-container img {
                width: 20%; 
            }

            .others-container .other-images {
                display: flex;
                flex-direction: row; 
                gap: 1vw; 
                justify-content: center; 
                flex-wrap: wrap; 
            }

            .others-container .other-images img {
                width: 20%; 
                max-width: 20vw;
                height: auto; 
            }

            .other-title {
                font-size: 1.9rem;
                padding-left: 2vw; 
            }

            .others-container {
                margin-top: 0;
            }

            .cart-label {
                display: none; 
            }
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.8); 
                z-index: 9;
                display: none;
            }

            body.dropdown-active .overlay {
                display: block;
            }

            .dropdown-content {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 110%; 
                left: 50%;
                transform: translateX(-50%);
                width: 60%;
                height: auto;
                gap: 20px; 
                z-index: 10;
                background-color: black;
                padding: 3vh 25vw; 
            }

            .dropdown-content a {
                text-decoration: none;
            }

            .dropdown-content a[data-text]::after {
                content: attr(data-text);
                display: block;
                text-align: center;
                color: white;
                text-transform: uppercase;
                font-size: 1.5rem;
            }

            .dropdown-content img {
                    display: none;
                }

            .no-scroll {
                    overflow: hidden;
                }
        }
        
        @media (min-width: 768px) and (max-width: 991px) and (orientation: portrait){
            body {
                display: flex;
                justify-content: center;
                min-height: 100vh; 
                margin: 0;
                overflow-y: auto;
            }
            
            .main-image{
                width: 95%;
            }
            .container {
                width: 100vw; /* Full width of the screen */
            }

            .dropdown-icon {
                width: 40vw;
                height: auto;
                max-width: 100%;
                z-index: 11; 
            }

            .main-content {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                max-width: 100vw; 
                margin: 0;

            }

            .main-image-container,
            .others-container,
            .cart-label {
                width: 100%;
                max-width: 100vw; 
                margin: 1vh 0;
            }

            .details-container{
                width: 84%;
                max-width: 100vw;
                margin: 1vh 0;
              
            }

            .details-container h2{
                font-size: 3rem;
            }
            
            .details-container p{
                font-size: 1.5rem;
            }
            .main-image-container .thumbnail-container {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 1.2vw;
            }

            .thumbnail-container img {
                width: 20%; /* Use intrinsic dimensions for sharper images */
               
            } 
            .others-container .other-images {
                display: flex;
                flex-direction: row; 
                gap: 1vw; 
                justify-content: center; 
                flex-wrap: wrap; 
            }

            .others-container .other-images img {
                width: 20%; 
                max-width: 20vw;
                height: auto; 
            }

            .other-title {
                font-size: 1.9rem;
                padding-left: 2vw; 
            }

            .others-container {
                margin-top: 0;
            }

            .cart-label {
                display: none; 
            }
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.8); 
                z-index: 9;
                display: none;
            }

            body.dropdown-active .overlay {
                display: block;
            }

            .dropdown-content {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 110%; 
                left: 50%;
                transform: translateX(-50%);
                width: 60%;
                height: auto;
                gap: 20px; 
                z-index: 10;
                background-color: black;
                padding: 3vh 25vw; 
            }

            .dropdown-content a {
                text-decoration: none;
            }

            .dropdown-content a[data-text]::after {
                content: attr(data-text);
                display: block;
                text-align: center;
                color: white;
                text-transform: uppercase;
                font-size: 1.5rem;
            }

            .dropdown-content img {
                    display: none;
                }

            .no-scroll {
                    overflow: hidden;
                }
        }

      

    </style>
</head>
<body>
    <div class="main-content">
        <!-- Dropdown icon and content -->
        <div class="container">
                <img src="images/anaduomeno.png" alt="Dropdown Icon" class="dropdown-icon">
            <div class="dropdown-content">
                <a href="clothes.html" data-text="Clothes"><img src="images/clothes.png" alt="Clothes" class="dropdown-item"></a>
                <a href="clothes.html" data-text="About"><img src="images/about.png" alt="About" class="dropdown-item"></a>
                <a href="clothes.html" data-text="Contact"><img src="images/contact.png" alt="Contact" class="dropdown-item"></a>
            </div>
        </div>

        <!-- Main image section with thumbnails below -->
        <div class="main-image-container">
            <img src="images/IMG_0456.jpg" alt="Exoskeleton Jacket" class="main-image">
            <div class="thumbnail-container">
                <img src="images/IMG_0456.jpg" alt="Thumbnail 1" onclick="changeMainImage(this.src)">
                <img src="images/IMG_0517.jpg" alt="Thumbnail 2" onclick="changeMainImage(this.src)">
                <img src="images/IMG_0548.jpg" alt="Thumbnail 3" onclick="changeMainImage(this.src)">
                <img src="images/IMG_0564.jpg" alt="Thumbnail 4" onclick="changeMainImage(this.src)">
            </div>
        </div>

        <!-- Clothing details section -->
        <div class="details-container">
            <div class="clothing-details">
                <h2>Exoskeleton</h2>
                <p>Customized Dickies Jacket</p>
                <p>Size: (Man’s): Large.</p>
                <ul>
                    <li>Work gloves will be included in the package</li>
                    <li>Vintage Dickies Jacket</li>
                    <li>Hand painted</li>
                    <li>Robust Zipper</li>
                    <li>Large pockets</li>
                    <li>Sherpa lining</li>
                    <li>Regular fit</li>
                </ul>
            </div>
            
            <div class="button-container">
                <button class="button">Not Available</button>
            </div>
        </div>
        
        <!-- Other images section with title -->
        <div class="others-container">
            <div class="other-title">Others</div>
            <div class="other-images">
                <img src="images/IMG_0639.jpg" alt="Other Image 1">
                <img src="images/IMG_4861.jpg" alt="Other Image 2">
                <img src="images/IMG_4867 (1).jpg" alt="Other Image 3">
                <img src="images/image0.jpg" alt="Other Image 4">
            </div>
        </div>

    <div class="cart-label">
        Cart
    </div>
        
    <div class="overlay"></div>
    <script src="index.js"></script>
</body>
</html>
